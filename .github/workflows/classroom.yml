name: Autograding Tests
'on':
- push
- workflow_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    env:
      CI: true

      # These variables should go in the GitHub secrets, but since this is a public exercise
      # template, we want to make these available in any forks of the repository as well.
      # Therefore we are not using secrets but instead storing them here:
      JANE_USERNAME: jane.doe@example.com
      JANE_PASSWORD: ItWorksOnMyMac1!

      JOHN_USERNAME: john.doe@example.com
      JOHN_PASSWORD: AllTestsPass1!

      ALICE_USERNAME: alice@example.com
      ALICE_PASSWORD: '}3jc\xJnQ=E=+Q_y/%Hd311bW#6{_Oyj'

      BOB_USERNAME: bob@example.com
      BOB_PASSWORD: 'nUL9zA3q=Nt7\N,0?CL&c74U,Ic)0)dN'

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Disable man-db auto-update (prevents apt-get hangs)
      run: sudo rm -f /var/lib/man-db/auto-update

    - name: Install Robot Framework and Browser library
      run: pip install -r requirements.txt
      timeout-minutes: 4

    - name: Install Chromium browser
      run: rfbrowser init chromium
      timeout-minutes: 2

    - name: Copy .env file
      run: cp .github/.env.test .env

    - name: Run tests
      run: robot --outputdir=test-results/ tests/
      timeout-minutes: 5
      continue-on-error: true

    - name: Extract traces
      run: "./.github/extract_traces.sh"

    # login page tests
    - name: User navigates to login page
      id: login-page-1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: User navigates to login page
        setup-command: ''
        command: "./.github/find_trace.sh 'your@email.com'"
        timeout: 1
        max-score: 10

    - name: Login username is case insensitive
      id: login-page-2
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Login username is case insensitive
        setup-command: ''
        command: "./.github/find_trace.sh 'login-case-insensitive-email'"
        timeout: 1
        max-score: 5

    - name: Login accepts correct credentials
      id: login-page-3
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Login accepts correct credentials
        setup-command: ''
        command: "./.github/find_trace.sh 'Successfully logged in'"
        timeout: 1
        max-score: 5

    - name: Login email is validated
      id: login-page-4a
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Login email is validated
        setup-command: ''
        command: "./.github/find_trace.sh 'Please enter a valid email address.'"
        timeout: 1
        max-score: 10

    - name: Login password is validated
      id: login-page-4b
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Login password is validated
        setup-command: ''
        command: "./.github/find_trace.sh 'Password must be at least 6 characters long.'"
        timeout: 1
        max-score: 10

    - name: Login rejects invalid credentials
      id: login-page-4c
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Login rejects invalid credentials
        setup-command: ''
        command: "./.github/find_trace.sh 'Invalid email or password'"
        timeout: 1
        max-score: 10

    - name: Unauthenticated users cannot access /dashboard
      id: login-page-5
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Unauthenticated users cannot access /dashboard
        setup-command: ''
        command: "./.github/find_trace.sh 'You must be logged in to enter the dashboard'"
        timeout: 1
        max-score: 10

    - name: User can log out
      id: login-page-6
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: User can log out
        setup-command: ''
        command: "./.github/find_trace.sh 'You have been logged out.'"
        timeout: 1
        max-score: 10



    # registration page tests
    - name: Registration page exists
      id: register-page-1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Registration page exists
        setup-command: ''
        command: "./.github/find_trace.sh 'Full name'"
        timeout: 1
        max-score: 5

    - name: Registration page form validation
      id: register-page-2
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Registration page form validation
        setup-command: ''
        command: "./.github/find_trace.sh 'name is required'"
        timeout: 1
        max-score: 5

    - name: Registration email is already in use
      id: register-page-3a
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Registration email is already in use
        setup-command: ''
        command: "./.github/find_trace.sh 'Email is already in use'"
        timeout: 1
        max-score: 5

    - name: Registration email is case insensitive
      id: register-page-3b
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Registration email is case insensitive
        setup-command: ''
        command: "./.github/find_trace.sh 'registration-case-insensitive-email-conflict'"
        timeout: 1
        max-score: 5

    - name: Registration creates a new account
      id: register-page-4
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Registration creates a new account
        setup-command: ''
        command: "./.github/find_trace.sh 'Account created successfully'"
        timeout: 1
        max-score: 10

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        LOGIN-PAGE-1_RESULTS: "${{steps.login-page-1.outputs.result}}"
        LOGIN-PAGE-2_RESULTS: "${{steps.login-page-2.outputs.result}}"
        LOGIN-PAGE-3_RESULTS: "${{steps.login-page-3.outputs.result}}"
        LOGIN-PAGE-4A_RESULTS: "${{steps.login-page-4a.outputs.result}}"
        LOGIN-PAGE-4B_RESULTS: "${{steps.login-page-4b.outputs.result}}"
        LOGIN-PAGE-4C_RESULTS: "${{steps.login-page-4c.outputs.result}}"
        LOGIN-PAGE-5_RESULTS: "${{steps.login-page-5.outputs.result}}"
        LOGIN-PAGE-6_RESULTS: "${{steps.login-page-6.outputs.result}}"

        REGISTER-PAGE-1_RESULTS: "${{steps.register-page-1.outputs.result}}"
        REGISTER-PAGE-2_RESULTS: "${{steps.register-page-2.outputs.result}}"
        REGISTER-PAGE-3A_RESULTS: "${{steps.register-page-3a.outputs.result}}"
        REGISTER-PAGE-3B_RESULTS: "${{steps.register-page-3b.outputs.result}}"
        REGISTER-PAGE-4_RESULTS: "${{steps.register-page-4.outputs.result}}"

      with:
        runners: login-page-1,login-page-2,login-page-3,login-page-4a,login-page-4b,login-page-4c,login-page-5,login-page-6,register-page-1,register-page-2,register-page-3a,register-page-3b,register-page-4

    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: test-results
        retention-days: 7
